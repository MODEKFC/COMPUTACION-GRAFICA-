<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Cartesiano Completo</title>
</head>
<body>
    <h2>Línea Dinámica con Eje Vertical y Horizontal</h2>
    <CENTER><h2>REALIZADO POR : MARCO ANTONIO ALVAREZ CAYO</h2></CENTER>
    
    <div style="text-align: center;">
        <canvas id="myCanvas" width="800" height="400" style="border: 1px solid black; background-color: #ffffff;"></canvas>
    </div>

<script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");

    var xstart = 0; 
    var xend = canvas.width; 
    var step = 1; 
    var time = 0; 

    function drawFullPlano() {
        ctx.strokeStyle = "#000"; // Color negro para los ejes
        ctx.lineWidth = 1;

        // --- EJE X (Horizontal en el medio) ---
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();

        // --- EJE Y (Vertical en el medio) ---
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // --- MARCAS DE DIVISIÓN (Opcional para detalle) ---
        ctx.strokeStyle = "#ccc";
        for(var i=0; i < canvas.width; i+=50) {
            ctx.beginPath();
            ctx.moveTo(i, canvas.height/2 - 5);
            ctx.lineTo(i, canvas.height/2 + 5);
            ctx.stroke();
        }
        for(var j=0; j < canvas.height; j+=50) {
            ctx.beginPath();
            ctx.moveTo(canvas.width/2 - 5, j);
            ctx.lineTo(canvas.width/2 + 5, j);
            ctx.stroke();
        }

        // Etiquetas
        ctx.fillStyle = "black";
        ctx.font = "bold 14px Arial";
        ctx.fillText("Y", canvas.width / 2 + 10, 20);
        ctx.fillText("X", canvas.width - 20, canvas.height / 2 - 10);
    }

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujamos el plano de fondo
        drawFullPlano();

        // Dibujamos la función
        ctx.beginPath();
        ctx.strokeStyle = 'blue'; 
        ctx.lineWidth = 2;

        for (var x = xstart; x < xend; x += step) {
            // Ajustamos la frecuencia y el movimiento con 'time'
            var y = Math.sin((x - canvas.width/2) * 0.02 + time); 

            // Punto X real en el canvas
            var drawX = x;
            // Punto Y centrado en el eje horizontal
            var drawY = canvas.height / 2 - y * 100;

            if (x === xstart) {
                ctx.moveTo(drawX, drawY);
            } else {
                ctx.lineTo(drawX, drawY);
            }
        }
        ctx.stroke();
    }

    function animate() {
        drawGraph();
        time -= 0.05; // Velocidad de la onda
        requestAnimationFrame(animate);
    }

    animate();
</script>  
</body>
</html>
